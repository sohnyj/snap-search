<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Snap Search - Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <h1>Snap Search Settings</h1>

    <!-- Appearance -->
    <section class="section">
      <h2>Appearance</h2>
      <div class="form-row">
        <label for="display-mode">Display Mode</label>
        <select id="display-mode">
          <option value="favicon">Favicon</option>
          <option value="label">Label</option>
        </select>
      </div>
      <div class="form-row">
        <label for="icon-size">Icon Size (px)</label>
        <select id="icon-size">
          <option value="16">16</option>
          <option value="24">24</option>
          <option value="32">32</option>
          <option value="48">48</option>
        </select>
      </div>
      <div class="form-row">
        <label for="theme-select">Theme</label>
        <select id="theme-select">
          <option value="auto">Auto (follow Firefox)</option>
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </div>
      <div class="form-row">
        <label for="open-background">Open search in background tab</label>
        <input type="checkbox" id="open-background">
      </div>
    </section>

    <!-- Excluded Domains -->
    <section class="section">
      <h2>Excluded Domains</h2>
      <div id="excluded-list"></div>
      <div class="add-domain">
        <input type="text" id="new-domain" placeholder="e.g. example1.com, example2.com">
        <button id="add-domain-btn" class="btn">Add</button>
      </div>
    </section>

    <!-- Built-in Actions -->
    <section class="section">
      <h2>Built-in Actions</h2>
      <div class="engine-row">
        <input type="checkbox" id="builtin-copy">
        <label for="builtin-copy" class="engine-name">📋 Copy</label>
      </div>
      <div class="engine-row">
        <input type="checkbox" id="builtin-openlink">
        <label for="builtin-openlink" class="engine-name">🔗 Open Link</label>
      </div>
      <div class="engine-row">
        <input type="checkbox" id="builtin-currency">
        <label for="builtin-currency" class="engine-name">💱 Currency</label>
        <select id="target-currency">
          <option value="USD">USD</option>
          <option value="EUR">EUR</option>
          <option value="GBP">GBP</option>
          <option value="KRW">KRW</option>
          <option value="JPY">JPY</option>
          <option value="CNY">CNY</option>
        </select>
      </div>
    </section>

    <!-- Search Engines -->
    <section class="section">
      <h2>Search Engines</h2>
      <div id="engine-list"></div>
      <div class="add-engine">
        <input type="text" id="new-engine-name" placeholder="Name (e.g. Google)">
        <input type="text" id="new-engine-url" placeholder="URL with %s (e.g. https://www.google.com/search?q=%s)">
        <button id="add-engine-btn" class="btn">Add</button>
        <button id="add-divider-btn" class="btn">Add Divider</button>
      </div>
    </section>

    <!-- Import / Export -->
    <section class="section">
      <h2>Import / Export</h2>
      <div class="btn-group">
        <button id="export-btn" class="btn">Export JSON</button>
        <button id="import-btn" class="btn">Import JSON</button>
        <input type="file" id="import-file" accept=".json" hidden>
        <button id="reset-btn" class="btn btn-danger">Reset to Default</button>
      </div>
    </section>

    <div id="status-msg" class="status-msg" hidden></div>
  </div>

  <script src="../lib/defaults.js"></script>
  <script src="options.js"></script>
</body>
</html>
